<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Code – BlackNode</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="style.css">
<link rel="icon" href="images/logo.png">
</head>
<body>

<header>
  <nav class="nav">
    <a href="index.html" class="brand">
      <img src="images/logo.png" alt="BlackNode Logo">
      <span>BlackNode</span>
    </a>
    <div class="nav-links">
      <a href="index.html">← Back to Home</a>
    </div>
  </nav>
</header>

<main>
  <div class="container" style="max-width: 720px;">
    <div class="eyebrow">BlackNode</div>
    <h1>Access Code Generator</h1>
    <p class="lead">Generate your BlackNode access code.</p>

    <div class="card" style="margin-top: 32px;">
      <div class="code-box">
        <div id="code-output">BLACKNODE-XXXX-XXXX-XXXX</div>
        <div class="btns" style="justify-content: center; margin-top: 14px;">
          <button class="btn" id="generate-btn">Generate</button>
          <button class="btn btn-secondary" id="copy-btn">Copy</button>
        </div>
        <p class="code-note" id="copy-note"></p>
      </div>
    </div>
  </div>
</main>

<footer>
  <div class="container footer-inner">
    <span>© 2026 BlackNode</span>
    <div class="footer-links">
      <a href="index.html">Home</a>
    </div>
  </div>
</footer>

<script>
const output = document.getElementById('code-output');
const copyNote = document.getElementById('copy-note');

function generateCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  const rand = (n) => Array.from({length: n}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
  const code = `BLACKNODE-${rand(4)}-${rand(4)}-${rand(4)}`;
  output.textContent = code;
  copyNote.textContent = '';
}

document.getElementById('generate-btn').addEventListener('click', generateCode);

document.getElementById('copy-btn').addEventListener('click', async () => {
  const code = output.textContent;
  if (code.includes('XXXX')) {
    copyNote.textContent = 'Please generate a code first.';
    return;
  }
  try {
    await navigator.clipboard.writeText(code);
    copyNote.textContent = 'Copied to clipboard';
  } catch(e) {
    copyNote.textContent = 'Copy failed';
  }
});

generateCode();
</script>

</body>
</html>
